  - type: Features
    data:
      - name: Single Interoperable UPI QR
        description: >-
          One BharatPe QR that accepts payments from every UPI-enabled
          consumer app, free of MDR for merchants.
      - name: BharatPe Speaker
        description: >-
          Audio device that announces UPI transaction amounts in real time
          so merchants can confirm payment without checking the phone.
      - name: BharatSwipe Card Acceptance
        description: >-
          Mobile and countertop POS devices for accepting domestic and
          international credit and debit cards.
      - name: BharatPe One All-in-One POS
        description: >-
          Integrated POS device combining UPI QR, card swipe, speaker,
          and billing in a single Android-based device.
      - name: Merchant Business Loans
        description: >-
          Collateral-free working-capital loans for merchants originated
          through partner NBFCs, underwritten on UPI transaction data.
      - name: PostPe Buy Now Pay Later
        description: >-
          Consumer BNPL credit line usable across BharatPe-accepting
          merchants and as a co-branded Unity Bank credit card.
      - name: InvestBharatPe / 12% Club Investments
        description: >-
          Consumer investment platform offering fixed-income products
          through RBI-regulated partner NBFCs.
      - name: Co-Branded Credit Card
        description: >-
          BharatPe co-branded credit card issued in partnership with
          Unity Small Finance Bank.
      - name: Bill Payments
        description: >-
          BBPS-rail utility, recharge, and bill payment flows surfaced
          inside the BharatPe merchant app.
  - type: UseCases
    data:
      - name: Kirana And Grocery Acceptance
        description: >-
          Neighborhood kirana stores and grocers accept UPI payments
          from any customer app with a single QR sticker.
      - name: Voice-Confirmed Counter Payments
        description: >-
          High-volume small-ticket counters confirm each UPI receipt
          via audio without staff checking the phone screen.
      - name: Card Acceptance For Offline Retail
        description: >-
          Salons, restaurants, and retail outlets accept credit and
          debit card swipes alongside UPI through BharatSwipe.
      - name: Working-Capital Lending For SMBs
        description: >-
          Small merchants borrow short-term business loans underwritten
          on their UPI transaction history with BharatPe.
      - name: Consumer Credit At Checkout
        description: >-
          Customers tap PostPe at participating BharatPe merchants to
          split or defer payment via a Unity Bank-issued credit line.
      - name: Retail Investments For India's Mass Market
        description: >-
          Indian retail consumers deploy savings into fixed-income
          products via the InvestBharatPe / 12% Club platform.
  - type: Integrations
    data:
      - name: Unity Small Finance Bank
        description: >-
          Resilient Innovations (BharatPe) is a co-promoter of Unity
          Small Finance Bank, which issues the co-branded credit card
          and powers PostPe.
      - name: NPCI UPI
        description: >-
          BharatPe is a UPI third-party application provider operating
          on the NPCI Unified Payments Interface rails.
      - name: BBPS
        description: >-
          BharatPe bill payments are powered by the Bharat Bill Payment
          System operated by NPCI.
      - name: Partner NBFCs
        description: >-
          Lending products are originated through a network of
          RBI-registered NBFC partners listed on the BharatPe site.
      - name: Card Networks
        description: >-
          BharatSwipe POS devices accept Visa, Mastercard, RuPay, and
          American Express card transactions.
  - type: Solutions
    data:
      - name: BharatPe Merchant
        description: >-
          The merchant-facing UPI QR, speaker, swipe, POS, lending,
          and bill payments stack delivered through the BharatPe app.
      - name: PostPe Consumer
        description: >-
          The consumer-facing buy-now-pay-later and credit-card app,
          including repayment flows powered by Unity Bank.
      - name: BharatPe Enterprise
        description: >-
          A sales-led offering for large merchants, chains, and partners
          surfaced at enterprise.bharatpe.in.
