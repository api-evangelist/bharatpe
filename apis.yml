aid: bharatpe
name: BharatPe
description: >-
  BharatPe is a New Delhi-based fintech company founded in 2018 by Ashneer
  Grover and Shashvat Nakrani that provides digital payments and financial
  services to Indian small and medium businesses. Its merchant stack centers
  on a single interoperable UPI QR for payment acceptance across all UPI
  apps, augmented by BharatPe Speaker for voice transaction confirmations,
  BharatSwipe POS card machines for offline acceptance, BharatPe One
  (all-in-one POS), bill payments, and a co-branded credit card. On the
  financing side, BharatPe originates business loans for merchants through
  partner NBFCs, runs the InvestBharatPe / 12% Club investment platform,
  operates the PostPe buy-now-pay-later product, and is a co-promoter of
  Unity Small Finance Bank. The company reports more than ten million
  merchant partners across 450+ Indian cities and turned profitable in
  FY24 with roughly INR 1,700 crore in revenue. BharatPe is owned by
  Resilient Innovations Private Limited; it does not publish a public
  developer API, SDK, sandbox, or OpenAPI surface — its merchant and
  consumer products are delivered through native Android/iOS apps and an
  enterprise sales channel for partners.
